# ============================================================
# locations.yaml ― ロケーション（場所）名簿
# 「この場所が出てきたら、この背景参照画像を使う」という対応表です。
# characters.yaml と同じ形です。このファイルだけ編集すれば新作に対応できます。
#
# 役割：コマ構成に場所の言葉（「会議室」「廊下」など）が出てきたとき、
#       AIが正しい背景参照画像（ロケーションシート）を選べるようにする。
# ============================================================

locations:
  # ↓ これは「書き方の例」です。実際の作品に合わせて入れ替えてください。
  - key: room01                    # 内部キー（英数字・自由）
    name: ""                       # 正式な場所名（例: "会議室"）
    aliases: []                    # 表記ゆれ（例: ["ミーティングルーム", "打ち合わせ室"]）
    sheets: []                     # ロケーションシート画像のパス（例: ["step3_設定資料/location_sheets/conference_room.png"]）

  # 同じ場所でも章ごとに光や季節が変わる場合は variants を使います（不要なら書かない）。
  # - key: courtyard
  #   name: "中庭"
  #   aliases: ["庭", "外"]
  #   sheets: ["step3_設定資料/location_sheets/courtyard.png"]
  #   variants:
  #     - when_tone: ["希望", "再出発"]
  #       sheets: ["step3_設定資料/location_sheets/courtyard_満開.png"]

  # 参照画像を作らず、プロンプトの文章だけで描く場所（電車・駅など一時的な背景）は
  # prompt_only: true を付けると、スクリプトが「画像なし」と扱います。
  # - key: train
  #   name: "電車"
  #   aliases: ["駅", "ホーム", "車内"]
  #   prompt_only: true
