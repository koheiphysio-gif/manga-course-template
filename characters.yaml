# ============================================================
# characters.yaml ― キャラクター名簿
# 「このキャラが出てきたら、この参照画像を使う」という対応表です。
# このファイルだけ編集すれば新作に対応できます（スクリプトは触りません）。
#
# 役割：脚本やコマ構成にキャラ名（あだ名・名字・「彼」なども）が出てきたとき、
#       AIが同じ人物だと分かり、正しい参照画像（キャラシート）を選べるようにする。
#
# Step3で各キャラの設定資料とキャラシート画像を作ったら、ここに登録します。
# ============================================================

characters:
  # ↓ これは「書き方の例」です。実際の作品に合わせて中身を入れ替えてください。
  - key: protagonist               # 内部キー（英数字・自由。重複しなければ何でもOK）
    name: ""                       # 物語で使う正式名（例: "ハルト"）。コマ構成の name と揃える
    aliases: []                    # 表記ゆれを全部並べる（例: ["はると", "橋本", "彼", "PT"]）
    sheets: []                     # キャラシート画像のパス（例: ["step3_設定資料/character_sheets/haruto.png"]）

  # 服装などが場面で変わるキャラだけ、variants を使います（不要なら書かない）。
  # 判断（どの場面でどの服か）はAIに任せ、ここには候補だけ並べます。
  # - key: heroine
  #   name: "サトミ"
  #   aliases: ["さとみ", "中野"]
  #   sheets: ["step3_設定資料/character_sheets/satomi.png"]
  #   variants:
  #     - when_tone: ["日常", "回復"]          # この感情トーンのとき
  #       sheets: ["step3_設定資料/character_sheets/satomi_私服.png"]
  #     - when_location: ["職場", "施設"]      # この場所のとき
  #       sheets: ["step3_設定資料/character_sheets/satomi_制服.png"]
